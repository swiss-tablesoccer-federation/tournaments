<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiss Tablesoccer Federation - Rankings</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <!-- Site styles -->
  <link rel="stylesheet" href="../assets/css/main.css" />

</head>
<body>

<!-- ── Site navbar (logo + page title in one bar) ────────── -->
<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="https://swisstablesoccer.ch" class="site-nav-logo" aria-label="Swiss Tablesoccer Federation – Home">
      <img src="https://github.com/user-attachments/assets/6df8525e-7665-4ab6-8c5a-407ddf00bc91"
           alt="Swiss Tablesoccer Federation" />
    </a>
    <span class="site-nav-title" data-i18n="pageTitle_rankings">Rankings</span>
    <div class="lang-selector" id="langSelector" aria-label="Language">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 px-md-5 py-4 page-content">

  <!-- ── Category tab bar ─────────────────────────────────── -->
  <div class="ranking-tabs mb-3" id="rankingTabs" role="tablist">
    <!-- Populated by rankings.js -->
  </div>

  <!-- ── Two-column layout ────────────────────────────────────── -->
  <div class="ranking-layout">

    <!-- Left column (40%): table -->
    <div class="ranking-col-left">
      <div class="table-card">
        <div class="table-scroll-wrapper">
          <table class="table t-table">
            <thead>
              <tr>
                <th class="col-rank">#</th>
                <th data-i18n="colPlayer">Player</th>
                <th class="col-country" data-i18n="colCountry">Country</th>
                <th class="col-points text-end" data-i18n="colPoints">Points</th>
              </tr>
            </thead>
            <tbody id="rankingBody">
              <tr class="state-row">
                <td colspan="4">
                  <span class="spinner-border spinner-border-sm text-secondary me-2" role="status"></span>
                  Loading…
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Right column (60%): player detail – hidden on mobile -->
    <div class="ranking-col-right d-none d-md-flex">
      <div class="player-detail-panel" id="playerDetail">
        <div class="pd-placeholder">
          <i class="fa-regular fa-hand-pointer me-2"></i>Select a player to view details
        </div>
      </div>
    </div>

  </div>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <div class="text-center mt-3 page-footer">
    <span data-i18n="dataProvidedBy">Data provided by</span>
    <a href="https://tablesoccer.org" target="_blank" rel="noopener">tablesoccer.org</a>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery 3 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Site scripts -->
<script src="../assets/js/i18n.js"></script>
<script src="../assets/js/rankings.js"></script>
</body>
</html>
