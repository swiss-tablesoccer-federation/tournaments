<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiss Tablesoccer Federation - Tournament Calendar</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/main.css" />

</head>
<body>

<!-- ── Site navbar (logo + page title in one bar) ────────── -->
<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="https://swisstablesoccer.ch" class="site-nav-logo" aria-label="Swiss Tablesoccer Federation – Home">
      <img src="https://github.com/user-attachments/assets/6df8525e-7665-4ab6-8c5a-407ddf00bc91"
           alt="Swiss Tablesoccer Federation" />
    </a>
    <span class="site-nav-title" id="tourTitle" data-i18n="pageTitle_tournaments">Tournament Calendar</span>
    <div class="lang-selector" id="langSelector" aria-label="Language">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="it">IT</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 px-md-5 py-4 page-content">

  <!-- ── Filters (collapsible, expanded by default on non-mobile) ── -->
  <div class="collapse" id="filterCollapse">

    <div class="row g-4 mb-3 align-items-end">

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label" data-i18n="filterCategory">Category:</div>
        <select class="filter-control" id="categorySelect">
          <option value="" data-i18n="all">All</option>
        </select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label" data-i18n="filterTable">Table:</div>
        <select class="filter-control" id="playgroundSelect">
          <option value="" data-i18n="all">All</option>
        </select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label" data-i18n="filterSearch">Search:</div>
        <input type="search" class="filter-control" id="searchInput"
               data-i18n-placeholder="searchPlaceholder"
               placeholder="Name or city..." autocomplete="off" />
      </div>

    </div>

  </div>

  <!-- ── Controls: filter toggle + hide-past + stats + share ── -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
    <button class="filter-toggle-btn" type="button"
            data-bs-toggle="collapse" data-bs-target="#filterCollapse"
            aria-expanded="false" aria-controls="filterCollapse"
            id="filterToggle">
      <i class="fa-solid fa-sliders"></i> <span data-i18n="filterButton">Filters</span>
      <i class="fa-solid fa-chevron-up chevron"></i>
    </button>
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" role="switch" id="hidePast" checked />
      <label class="form-check-label small text-secondary" for="hidePast" data-i18n="hidePast">Hide past</label>
    </div>
    <span class="small text-secondary d-none d-sm-inline" id="statsText"></span>
    <div class="d-flex gap-2 ms-auto">
      <button id="calendarBtn" class="share-btn"
              data-bs-toggle="tooltip" data-bs-placement="left"
              data-i18n-title="calendarTooltip"
              title="Add to calendar"
              data-i18n-aria-label="calendarTooltip"
              aria-label="Add to calendar">
        <i class="fa-solid fa-calendar-plus"></i>
      </button>
      <button id="shareBtn" class="share-btn"
              data-bs-toggle="tooltip" data-bs-placement="left" data-bs-trigger="manual"
              data-i18n-title="linkCopied"
              title="Link copied!"
              data-i18n-aria-label="copyLinkAria"
              aria-label="Copy link to clipboard">
        <i class="fa-solid fa-share-from-square"></i>
      </button>
    </div>
  </div>

  <!-- ── Table card ───────────────────────────────────────────── -->
  <div class="table-card">
    <div class="table-scroll-wrapper">
      <table class="table t-table">
        <thead>
          <tr>
            <th class="col-cat" data-i18n="colCategory">Category</th>
            <th class="col-itsf"></th>
            <th data-i18n="colName">Name</th>
            <th class="col-country" data-i18n="colCountry">Country</th>
            <th data-i18n="colDate">Date</th>
            <th class="col-pg" data-i18n="colTable">Table</th>
            <th class="text-end col-actions"><!-- actions --></th>
          </tr>
        </thead>
        <tbody id="tournamentBody">
          <tr class="state-row">
            <td colspan="7">
              <span class="spinner-border spinner-border-sm text-secondary me-2" role="status"></span>
              Loading tournaments...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <div class="text-center mt-3 page-footer">
    <span data-i18n="dataProvidedBy">Data provided by</span>
    <a href="https://tablesoccer.org" target="_blank" rel="noopener">tablesoccer.org</a>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery 3 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Site scripts -->
<script src="assets/js/i18n.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
