<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swiss Tablesoccer Federation - Tournament Calendar</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <!-- Site styles -->
  <link rel="stylesheet" href="assets/css/main.css" />

</head>
<body>

<!-- ── Site navbar (logo + page title in one bar) ────────── -->
<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="https://swisstablesoccer.ch" class="site-nav-logo" aria-label="Swiss Tablesoccer Federation – Home">
      <img src="https://github.com/user-attachments/assets/6df8525e-7665-4ab6-8c5a-407ddf00bc91"
           alt="Swiss Tablesoccer Federation" />
    </a>
    <span class="site-nav-title" id="tourTitle">Tournament Calendar</span>
  </div>
</nav>

<div class="container-fluid px-4 px-md-5 py-4 page-content">

  <!-- ── Filters (collapsible, expanded by default on non-mobile) ── -->
  <div class="collapse" id="filterCollapse">

    <div class="row g-4 mb-3 align-items-end">

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label">Season:</div>
        <select class="filter-control" id="seasonSelect"></select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label">Category:</div>
        <select class="filter-control" id="categorySelect">
          <option value="">All</option>
        </select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label">Table:</div>
        <select class="filter-control" id="playgroundSelect">
          <option value="">All</option>
        </select>
      </div>

      <div class="col-12 col-sm-6 col-lg-3">
        <div class="filter-label">Search:</div>
        <input type="search" class="filter-control" id="searchInput" placeholder="Name or city..." autocomplete="off" />
      </div>

    </div>

  </div>

  <!-- ── Controls: filter toggle + hide-past + stats + share ── -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
    <button class="filter-toggle-btn" type="button"
            data-bs-toggle="collapse" data-bs-target="#filterCollapse"
            aria-expanded="false" aria-controls="filterCollapse"
            id="filterToggle">
      <i class="fa-solid fa-sliders"></i> Filters
      <i class="fa-solid fa-chevron-up chevron"></i>
    </button>
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" role="switch" id="hidePast" checked />
      <label class="form-check-label small text-secondary" for="hidePast">Hide past</label>
    </div>
    <span class="small text-secondary d-none d-sm-inline" id="statsText"></span>
    <button id="shareBtn" class="share-btn ms-auto"
            data-bs-toggle="tooltip" data-bs-placement="left" data-bs-trigger="manual"
            title="Link copied!"
            aria-label="Copy link to clipboard">
      <i class="fa-solid fa-share-from-square"></i>
    </button>
  </div>

  <!-- ── Table card ───────────────────────────────────────────── -->
  <div class="table-card">
    <div class="table-scroll-wrapper">
      <table class="table t-table">
        <thead>
          <tr>
            <th class="col-cat">Category</th>
            <th class="col-itsf"></th>
            <th>Name</th>
            <th class="col-country">Country</th>
            <th>Date</th>
            <th class="col-pg">Table</th>
            <th class="text-end pe-4"><!-- actions --></th>
          </tr>
        </thead>
        <tbody id="tournamentBody">
          <tr class="state-row">
            <td colspan="7">
              <span class="spinner-border spinner-border-sm text-secondary me-2" role="status"></span>
              Loading tournaments...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Footer ───────────────────────────────────────────────── -->
  <div class="text-center mt-3 page-footer">
    Data provided by
    <a href="https://tablesoccer.org" target="_blank" rel="noopener">tablesoccer.org</a>
  </div>

</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- jQuery 3 -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Site scripts -->
<script src="assets/js/main.js"></script>
</body>
</html>
